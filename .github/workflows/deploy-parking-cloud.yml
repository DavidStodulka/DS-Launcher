name: Deploy parking-cloud Worker

on:
  push:
    branches: [ "main" ]
    paths: [ "parking-cloud/**", ".github/workflows/deploy-parking-cloud.yml" ]
  workflow_dispatch:

concurrency:
  group: "deploy-parking-cloud"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parking-cloud
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: parking-cloud
          command: deploy
